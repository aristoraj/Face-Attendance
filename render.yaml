# ─────────────────────────────────────────────────────────────────────────────
# Render deployment configuration
# Docs: https://render.com/docs/render-yaml
#
# HOW TO USE:
# 1. Push this repo to GitHub
# 2. In Render dashboard → New → Web Service → Connect repo
# 3. Render auto-detects this file
# 4. Set environment variable values in Render dashboard (marked sync: false)
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: zoho-face-recognition
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free          # Change to "starter" or higher for production
    region: singapore   # Options: oregon, frankfurt, singapore, ohio
    healthCheckPath: /api/health

    envVars:
      # ── Zoho OAuth (set these in Render dashboard, not here) ────────────────
      - key: ZOHO_CLIENT_ID
        sync: false       # Set manually in Render dashboard

      - key: ZOHO_CLIENT_SECRET
        sync: false       # Set manually in Render dashboard

      - key: ZOHO_REFRESH_TOKEN
        sync: false       # Set manually in Render dashboard

      # ── Zoho Creator App Config ─────────────────────────────────────────────
      - key: ZOHO_ACCOUNT_OWNER
        sync: 2demoedzola1       # Your Zoho account username

      - key: ZOHO_APP_NAME
        value: attendance-tracking   # Your app's link name

      - key: ZOHO_STUDENT_REPORT
        value: All_Student_Databases         # Report link name with student photos

      - key: ZOHO_ATTENDANCE_FORM
        value: Attendance           # Attendance form link name

      - key: ZOHO_DATA_CENTER
        value: com                  # com | eu | in | com.au | jp

      # ── Field Mappings — matched to your actual Zoho Creator forms ──────────
      # Student Database fields
      - key: FIELD_STUDENT_NAME
        value: Name          # Display name field in Student Database

      - key: FIELD_STUDENT_PHOTO
        value: Photo         # Image field in Student Database

      # Attendance form fields
      - key: FIELD_ATT_STUDENT
        value: Student       # Lookup field (links to Student Database by system ID)

      - key: FIELD_ATT_DATE
        value: Date          # Date field in Attendance form

      - key: FIELD_ATT_STATUS
        value: Attendance    # Dropdown field — must match an option in your dropdown (e.g. "Present")

      # ── Face Recognition Settings ───────────────────────────────────────────
      - key: FACE_MATCH_TOLERANCE
        value: "0.55"    # Lower = stricter (range: 0.4–0.65)

      - key: CACHE_TTL_SECONDS
        value: "3600"    # 1 hour

      # ── App Settings ────────────────────────────────────────────────────────
      - key: SECRET_KEY
        sync: false      # Set a random strong string in Render dashboard

      - key: DEBUG
      